services:
  # ============================================
  # POSTGRESQL - Dados permanentes
  # ============================================
  postgres:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    container_name: ${POSTGRES_CONTAINER_NAME:-postgres-abastecimento}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-abastecimento}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    networks:
      - dokploy-network

  # ============================================
  # REDIS - Fluxos, Rate Limit e Cache
  # ============================================
  redis:
    image: redis:${REDIS_VERSION:-7-alpine}
    container_name: ${REDIS_CONTAINER_NAME:-redis-abastecimento}
    command: redis-server --appendonly yes --save 60 1
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    networks:
      - dokploy-network

  # ============================================
  # N8N - Automação (sem nodes customizados)
  # ============================================
  n8n:
    image: n8nio/n8n:1.123.16
    container_name: ${API_CONTAINER_NAME:-abastecimento-api}
    environment:
      - N8N_HOST=${N8N_HOST:-0.0.0.0}
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-8uJm7vYh2xNf4QsW9ZcR3tGp5LkD6aB0}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem
      - N8N_COMMUNITY_PACKAGES_ENABLED=true
      
      # PostgreSQL
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-admin}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-admin123}
      
      # Redis
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      
      # Timezone
      - TZ=${TZ:-America/Sao_Paulo}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/home/node/.n8n/workflows
      - ./media:/home/node/.n8n/media
    ports:
      - "${N8N_PORT:-5678}:${N8N_PORT:-5678}"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - dokploy-network

  # ============================================
  # EVOLUTION API - WhatsApp Gateway
  # ============================================
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution-api
    environment:
      - SERVER_URL=${EVOLUTION_SERVER_URL:-http://localhost:8080}
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-evolution_api_key_2026}
      - DATABASE_CONNECTION_URI=mongodb://mongo:27017
      - RABBITMQ_ENABLED=false
      - WEBSOCKET_ENABLED=false
      - LOG_LEVEL=info
    ports:
      - "${EVOLUTION_PORT:-8080}:8080"
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - dokploy-network

  # ============================================
  # MONGODB - Banco para Evolution API
  # ============================================
  mongo:
    image: mongo:latest
    container_name: evolution-mongo
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - dokploy-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  n8n_data:
    driver: local
  evolution_instances:
    driver: local
  mongo_data:
    driver: local

# ============================================
# NETWORK
# ============================================
networks:
  dokploy-network:
    external: true
    name: dokploy-network
