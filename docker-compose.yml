services:
  # ============================================
  # POSTGRESQL - Dados permanentes
  # ============================================
  postgres:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    container_name: ${POSTGRES_CONTAINER_NAME:-postgres-abastecimento}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-abastecimento}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    networks:
      - dokploy-network

  # ============================================
  # REDIS - Sessões, Fluxos e Rate Limit
  # ============================================
  redis:
    image: redis:${REDIS_VERSION:-7-alpine}
    container_name: ${REDIS_CONTAINER_NAME:-redis-abastecimento}
    command: redis-server --appendonly yes --save 60 1
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    networks:
      - dokploy-network

  # ============================================
  # N8N - Automação principal e Nó do Baileys
  # ============================================
  n8n:
    image: n8nio/n8n:${N8N_VERSION:-latest}
    container_name: ${N8N_CONTAINER_NAME:-n8n-abastecimento}
    environment:
      - N8N_HOST=${N8N_HOST:-0.0.0.0}
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-8uJm7vYh2xNf4QsW9ZcR3tGp5LkD6aB0}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem
      
      # PostgreSQL para dados do n8n (Banco lógico 'n8n' criado no init.sql)
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-admin}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-admin123}
      
      # Timezone
      - TZ=${TZ:-America/Sao_Paulo}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/home/node/.n8n/workflows
      - ./media:/home/node/.n8n/media
      - ./sessions:/home/node/.n8n/sessions
    ports:
      - "${N8N_PORT:-5678}:${N8N_PORT:-5678}"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - dokploy-network

  # ============================================
  # API REST - Node Baileys (abastecimento-api-hcehqu)
  # ============================================
  api:
    # IMPORTANTE: Substitua pela imagem real da sua API Node Baileys
    image: ${API_IMAGE:-node:18-alpine} 
    container_name: ${API_CONTAINER_NAME:-abastecimento-api-hcehqu}
    restart: unless-stopped
    
    environment:
      # Configurações da API
      - API_PORT=${API_PORT:-8001}
      
      # Conexão com PostgreSQL (Para os endpoints /api/abastecimentos)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-abastecimento}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-admin123}
      
      # Conexão com Redis (Para rate limit e cache)
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      
      # Caminho da Sessão (Conforme README: /home/node/.n8n/sessions)
      - SESSION_PATH=/home/node/.n8n/sessions
      
      # Timezone
      - TZ=${TZ:-America/Sao_Paulo}
    
    volumes:
      # MONTAGEM CRUCIAL: Compartilha o volume do n8n para que a API 
      # possa acessar a pasta /home/node/.n8n/sessions
      - n8n_data:/home/node/.n8n
      - api_media:/app/media
      
    ports:
      - "${API_PORT:-8001}:${API_PORT:-8001}"
      
    depends_on:
      - postgres
      - redis
      - n8n
    networks:
      - dokploy-network

# ============================================
# VOLUMES
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  n8n_data:
    driver: local
  api_media:
    driver: local

# ============================================
# NETWORK
# ============================================
networks:
  dokploy-network:
    external: true
    name: dokploy-network
