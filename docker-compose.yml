services:
  # ============================================
  # POSTGRESQL - Dados permanentes
  # ============================================
  postgres:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    container_name: ${POSTGRES_CONTAINER_NAME:-postgres-abastecimento}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-abastecimento}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    networks:
      - dokploy-network

  # ============================================
  # REDIS - Fluxos, Rate Limit e Cache
  # ============================================
  redis:
    image: redis:${REDIS_VERSION:-7-alpine}
    container_name: ${REDIS_CONTAINER_NAME:-redis-abastecimento}
    command: redis-server --appendonly yes --save 60 1
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    networks:
      - dokploy-network

  # ============================================
  # N8N CUSTOM + BAILEYS (API + Automação)
  # ============================================
  n8n:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: ${API_CONTAINER_NAME:-abastecimento-api}
    environment:
      - N8N_HOST=${N8N_HOST:-0.0.0.0}
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-8uJm7vYh2xNf4QsW9ZcR3tGp5LkD6aB0}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem
      
      # Habilitar pacotes comunitários (segurança do entrypoint.sh)
      - N8N_COMMUNITY_PACKAGES_ENABLED=true
      - NODE_PATH=/usr/local/lib/node_modules
      
      # PostgreSQL
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-admin}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-admin123}
      
      # Redis (para o workflow usar)
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      
      # Timezone
      - TZ=${TZ:-America/Sao_Paulo}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/home/node/.n8n/workflows
      - ./media:/home/node/.n8n/media
      - ./sessions:/home/node/.n8n/sessions
    ports:
      # Interface do n8n
      - "${N8N_PORT:-5678}:${N8N_PORT:-5678}"
      # Porta da API REST (se o webhook do n8n estiver configurado nela)
      - "${API_PORT:-8001}:${N8N_PORT:-5678}"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - dokploy-network

# ============================================
# VOLUMES
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  n8n_data:
    driver: local

# ============================================
# NETWORK
# ============================================
networks:
  dokploy-network:
    external: true
    name: dokploy-network
